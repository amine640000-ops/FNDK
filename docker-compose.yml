version: "3.9"

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: nevo
      POSTGRES_USER: nevo
      POSTGRES_PASSWORD: nevo
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3.13-management
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    command: npm run dev --workspace apps/frontend -- --host 0.0.0.0
    environment:
      VITE_API_BASE_URL: http://localhost:4000
    ports:
      - "5173:5173"
    depends_on:
      - identity-service
      - admin-service

  identity-service:
    build:
      context: .
      dockerfile: apps/backend/identity-service/Dockerfile
    env_file:
      - .env.example
    ports:
      - "4001:4001"
    depends_on:
      - postgres
      - rabbitmq

  wallet-service:
    build:
      context: .
      dockerfile: apps/backend/wallet-service/Dockerfile
    env_file:
      - .env.example
    ports:
      - "4002:4002"
    depends_on:
      - postgres
      - rabbitmq

  vip-service:
    build:
      context: .
      dockerfile: apps/backend/vip-service/Dockerfile
    env_file:
      - .env.example
    ports:
      - "4003:4003"
    depends_on:
      - postgres
      - rabbitmq

  task-service:
    build:
      context: .
      dockerfile: apps/backend/task-service/Dockerfile
    env_file:
      - .env.example
    ports:
      - "4004:4004"
    depends_on:
      - postgres
      - rabbitmq

  notification-service:
    build:
      context: .
      dockerfile: apps/backend/notification-service/Dockerfile
    env_file:
      - .env.example
    ports:
      - "4005:4005"
    depends_on:
      - postgres
      - rabbitmq

  admin-service:
    build:
      context: .
      dockerfile: apps/backend/admin-service/Dockerfile
    env_file:
      - .env.example
    ports:
      - "4006:4006"
    depends_on:
      - postgres
      - rabbitmq

volumes:
  postgres-data:

